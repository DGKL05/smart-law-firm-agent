services:
  mysql:
    image: mysql:8.0
    container_name: smart-law-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_law_firm_agent
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: smart-law-redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    container_name: smart-law-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mysql-data:
  mongo-data:
